<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>출퇴근 기록 — 출퇴근 관리</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header" id="siteHeader"></header>

<div id="globalLoader" role="status" aria-label="로딩 중">
  <div class="spinner"></div>
</div>

<main class="main">

  <!-- ── 직원 뷰 ── -->
  <div id="employeeView">
    <div class="page-title">출퇴근 기록</div>
    <div class="page-subtitle" id="empTodayDate"></div>

    <!-- 오늘 현황 카드 -->
    <div class="today-card">
      <div class="today-date" id="empDateDisplay"></div>
      <div class="today-status-label" id="attendanceStatus">확인 중...</div>
      <div class="today-time-info" id="todayInfo"></div>
      <div class="schedule-info" id="scheduleDisplay"></div>
    </div>

    <!-- 출근/퇴근 버튼 (지체·뇌병변 장애 특화: 크고 명확한 버튼) -->
    <div class="clock-btn-wrap">
      <button class="btn clock-btn clock-btn-in" id="clockInBtn" type="button" disabled
        aria-label="출근 기록">
        🟢 출근
      </button>
      <button class="btn clock-btn clock-btn-out" id="clockOutBtn" type="button" disabled
        aria-label="퇴근 기록">
        🔴 퇴근
      </button>
    </div>

    <!-- 최근 출퇴근 이력 -->
    <div class="card section">
      <div class="card-title">최근 출퇴근 이력</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>날짜</th>
              <th>출근</th>
              <th>퇴근</th>
              <th>상태</th>
              <th>비고</th>
            </tr>
          </thead>
          <tbody id="historyTableBody">
            <tr><td colspan="5" class="empty-row">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── 관리자 뷰 ── -->
  <div id="adminView" style="display:none">
    <div class="page-title">출퇴근 관리</div>
    <div class="page-subtitle">직원 출퇴근 현황 확인 및 수동 입력</div>

    <div class="card section">
      <div class="filter-bar">
        <label for="dateFilter" class="form-label" style="margin:0; white-space:nowrap;">날짜 선택</label>
        <input class="form-control" id="dateFilter" type="date" style="max-width:180px" />
        <button class="btn btn-outline btn-sm" onclick="loadAttendanceTable()">조회</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>이름</th>
              <th>소속</th>
              <th>예정 근무</th>
              <th>출근</th>
              <th>퇴근</th>
              <th>상태</th>
              <th>수정</th>
            </tr>
          </thead>
          <tbody id="adminAttendanceBody">
            <tr><td colspan="7" class="empty-row">날짜를 선택하세요.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<!-- 수동 수정 모달 -->
<div class="modal-overlay" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="editModalTitle">출퇴근 수정</div>
      <button class="modal-close" onclick="closeEditModal()" aria-label="닫기">✕</button>
    </div>
    <form id="editForm" onsubmit="submitAdminEdit(event)">
      <input type="hidden" id="editRecordId" />
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="editClockIn">출근 시간</label>
          <input class="form-control" id="editClockIn" type="time" />
        </div>
        <div class="form-group">
          <label class="form-label" for="editClockOut">퇴근 시간 <span class="text-muted text-sm">(선택)</span></label>
          <input class="form-control" id="editClockOut" type="time" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="editNote">비고</label>
        <input class="form-control" id="editNote" type="text" placeholder="비고 내용 (선택)" />
      </div>
      <div class="flex gap-12 mt-16">
        <button type="button" class="btn btn-outline w-full" onclick="closeEditModal()">취소</button>
        <button type="submit" class="btn btn-primary w-full">저장</button>
      </div>
    </form>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/gsheet-api.js"></script>
<script src="js/gsheet-write.js"></script>
<script src="js/attendance.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const user = requireAuth();
    if (!user) return;

    renderHeader();
    renderNavLinks(user);

    const now = new Date();
    const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;
    const dayStr = ['일','월','화','수','목','금','토'][now.getDay()];

    if (user.role === '관리자') {
      document.getElementById('employeeView').style.display = 'none';
      document.getElementById('adminView').style.display = 'block';
      renderAdminAttendance();
    } else {
      document.getElementById('empDateDisplay').textContent = `${dateStr} (${dayStr}요일)`;
      document.getElementById('empTodayDate').textContent = `${dateStr} (${dayStr}요일)`;
      initAttendancePage();
    }
  });
</script>
</body>
</html>
