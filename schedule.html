<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스케줄 관리 — bkl HR</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="globalLoader" role="status" aria-label="로딩 중">
  <div class="spinner"></div>
</div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <h2>스케줄 관리</h2>
      <p>직원별 예정 출근·퇴근 시간 설정 (지각·조기퇴근 자동 판단 기준)</p>
    </div>

    <div class="card">
      <div class="section-header">
        <div class="card-title">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
          직원별 근무 스케줄
        </div>
        <button class="btn btn-outline btn-sm" onclick="loadSchedule()">새로고침</button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>이름</th>
              <th>소속</th>
              <th>직종</th>
              <th>예정 출근</th>
              <th>예정 퇴근</th>
              <th>수정</th>
            </tr>
          </thead>
          <tbody id="scheduleTableBody">
            <tr><td colspan="6" class="empty-row">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- 스케줄 수정 모달 -->
<div class="modal-overlay" id="scheduleModal" role="dialog" aria-modal="true" aria-labelledby="scheduleModalTitle">
  <div class="modal-box" style="max-width:360px">
    <div class="modal-header">
      <div class="modal-title" id="scheduleModalTitle">스케줄 수정</div>
      <button class="modal-close" onclick="closeScheduleModal()" aria-label="닫기">✕</button>
    </div>
    <form id="scheduleForm" onsubmit="submitSchedule(event)">
      <input type="hidden" id="schedEmpId" />
      <div class="form-group">
        <label class="form-label" for="schedIn">예정 출근 시간</label>
        <input class="form-control" id="schedIn" type="time" />
      </div>
      <div class="form-group">
        <label class="form-label" for="schedOut">예정 퇴근 시간</label>
        <input class="form-control" id="schedOut" type="time" />
      </div>
      <p class="text-sm text-muted mt-8">
        ※ 예정 시간을 비워두면 지각·조기퇴근 판단을 하지 않습니다.
      </p>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeScheduleModal()">취소</button>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/gsheet-api.js"></script>
<script src="js/gsheet-write.js"></script>
<script>
  let allEmpData = [];

  async function loadSchedule() {
    setLoading(true);
    try {
      allEmpData = await fetchActiveEmployees();
      renderScheduleTable();
    } catch (err) {
      showApiError(err.message);
    } finally {
      setLoading(false);
    }
  }

  function renderScheduleTable() {
    const tbody = document.getElementById('scheduleTableBody');
    if (allEmpData.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-row">재직 직원이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = allEmpData.map(e => `
      <tr>
        <td class="font-bold">${e['이름']}</td>
        <td>${e['소속'] || '-'}</td>
        <td>${e['직종'] || '-'}</td>
        <td>${e['예정출근시간'] || '<span class="text-muted">미설정</span>'}</td>
        <td>${e['예정퇴근시간'] || '<span class="text-muted">미설정</span>'}</td>
        <td>
          <button class="btn btn-sm btn-outline" onclick='openScheduleModal("${e['직원ID']}", "${e['이름']}", "${e['예정출근시간']||''}", "${e['예정퇴근시간']||''}")'>
            수정
          </button>
        </td>
      </tr>
    `).join('');
  }

  function openScheduleModal(empId, name, schedIn, schedOut) {
    document.getElementById('scheduleModalTitle').textContent = `${name} 스케줄 수정`;
    document.getElementById('schedEmpId').value = empId;
    document.getElementById('schedIn').value = schedIn;
    document.getElementById('schedOut').value = schedOut;
    document.getElementById('scheduleModal').style.display = 'flex';
  }

  function closeScheduleModal() {
    document.getElementById('scheduleModal').style.display = 'none';
  }

  async function submitSchedule(e) {
    e.preventDefault();
    const empId = document.getElementById('schedEmpId').value;
    const schedIn = document.getElementById('schedIn').value;
    const schedOut = document.getElementById('schedOut').value;
    const submitBtn = e.target.querySelector('[type="submit"]');
    submitBtn.disabled = true;

    try {
      await updateSchedule(empId, schedIn, schedOut);
      showToast('스케줄이 저장되었습니다.');
      closeScheduleModal();
      await loadSchedule();
    } catch (err) {
      showApiError(err.message);
    } finally {
      submitBtn.disabled = false;
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const user = requireAdmin();
    if (!user) return;
    renderSidebar(user);
    loadSchedule();
  });
</script>
</body>
</html>
