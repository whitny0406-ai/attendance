<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>업무일지 — bkl HR</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="globalLoader" role="status" aria-label="로딩 중">
  <div class="spinner"></div>
</div>

<!-- 이미지 라이트박스 -->
<div class="lightbox-overlay" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="이미지 확대" />
</div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <h2>업무일지</h2>
      <p>오늘의 업무 내용을 기록하세요.</p>
    </div>

    <!-- 탭: 등록 / 조회 -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="tabWrite"  onclick="switchTab('tabWrite',  this)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        업무일지 등록
      </button>
      <button class="tab-btn" data-tab="tabView"  onclick="switchTab('tabView',  this)">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg>
        일지 조회
      </button>
    </div>

    <!-- ▸ 등록 탭 -->
    <div class="tab-panel active" id="tabWrite">
      <div class="journal-form-card">
        <form id="journalForm" onsubmit="submitJournal(event)">

          <div class="form-grid" style="margin-bottom:16px;">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" for="journalDate">날짜 <span style="color:var(--danger)">*</span></label>
              <input class="form-control" id="journalDate" type="date" required />
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" for="journalTitle">제목 <span style="color:var(--danger)">*</span></label>
              <input class="form-control" id="journalTitle" type="text" placeholder="업무 제목" required maxlength="100" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="journalContent">업무 내용 <span style="color:var(--danger)">*</span></label>
            <textarea class="form-control" id="journalContent" placeholder="오늘 진행한 업무 내용을 자세히 적어주세요." required style="min-height:160px;" maxlength="3000"></textarea>
          </div>

          <!-- 이미지 업로드 -->
          <div class="form-group">
            <label class="form-label">사진 첨부 <span style="color:var(--gray-400); font-weight:400;">(선택, 최대 5MB)</span></label>
            <div class="image-upload-area" id="uploadArea">
              <input type="file" id="journalImage" accept="image/*" onchange="handleImageSelect(event)" />
              <div id="uploadPlaceholder">
                <div class="image-upload-icon">
                  <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                  </svg>
                </div>
                <div class="image-upload-text">클릭하거나 이미지를 드래그하세요</div>
                <div class="image-upload-hint">JPG, PNG, GIF, WEBP 지원 (최대 5MB)</div>
              </div>
            </div>
            <!-- 이미지 미리보기 -->
            <div id="imagePreviewArea" style="margin-top:12px; display:none;">
              <div class="image-preview-wrap">
                <img id="imagePreview" src="" alt="미리보기" style="max-width:100%; max-height:240px; border-radius:var(--radius-md); object-fit:contain; display:block;" />
                <button type="button" class="image-preview-remove" onclick="removeImage()" title="이미지 제거">✕</button>
              </div>
              <div id="imageFileName" style="margin-top:6px; font-size:12px; color:var(--gray-400);"></div>
            </div>
          </div>

          <div id="journalFormError" class="form-error"></div>
          <div id="journalFormInfo" style="font-size:13px; color:var(--gray-500); margin-bottom:12px; min-height:18px;"></div>

          <div style="display:flex; gap:12px; justify-content:flex-end;">
            <button type="button" class="btn btn-outline" onclick="resetJournalForm()">초기화</button>
            <button type="submit" class="btn btn-primary" id="journalSubmitBtn">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v14a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
              등록하기
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- ▸ 조회 탭 -->
    <div class="tab-panel" id="tabView">
      <div class="card">
        <!-- 날짜 필터 -->
        <div class="journal-date-filter">
          <label class="form-label" style="margin:0; white-space:nowrap;">날짜 선택</label>
          <input type="date" id="filterDate" class="form-control" style="max-width:180px; margin:0;" onchange="loadJournalsByDate()" />
          <button class="btn btn-outline btn-sm" onclick="clearDateFilter()">전체 보기</button>
          <button class="btn btn-outline btn-sm" onclick="goToToday()">오늘</button>
        </div>

        <div id="journalList">
          <div class="empty-row">업무일지를 불러오는 중...</div>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/gsheet-api.js"></script>
<script src="js/gsheet-write.js"></script>
<script>
  let selectedImageBase64 = null;
  let selectedImageType   = 'image/jpeg';
  let currentUser = null;

  // ── 탭 전환 ──
  function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tabId === 'tabView') loadAllJournals();
  }

  // ── 이미지 선택 처리 ──
  function handleImageSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    processImageFile(file);
  }

  function processImageFile(file) {
    const maxSize = 5 * 1024 * 1024; // 5MB
    if (file.size > maxSize) {
      document.getElementById('journalFormError').textContent = '이미지 크기는 5MB를 초과할 수 없습니다.';
      return;
    }
    document.getElementById('journalFormError').textContent = '';

    // 이미지 압축 및 base64 변환
    compressImage(file, 1200, 0.75).then(base64 => {
      selectedImageBase64 = base64;
      selectedImageType   = file.type || 'image/jpeg';

      document.getElementById('imagePreview').src = base64;
      document.getElementById('imageFileName').textContent = `${file.name} (${formatFileSize(file.size)})`;
      document.getElementById('uploadPlaceholder').style.display = 'none';
      document.getElementById('imagePreviewArea').style.display = 'block';
    });
  }

  // 이미지 압축 (Canvas 사용)
  function compressImage(file, maxWidth, quality) {
    return new Promise((resolve) => {
      const canvas = document.createElement('canvas');
      const img    = new Image();
      img.onload = () => {
        const ratio = Math.min(maxWidth / img.width, 1);
        canvas.width  = Math.round(img.width  * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = URL.createObjectURL(file);
    });
  }

  function removeImage() {
    selectedImageBase64 = null;
    selectedImageType   = 'image/jpeg';
    document.getElementById('journalImage').value = '';
    document.getElementById('imagePreview').src   = '';
    document.getElementById('imagePreviewArea').style.display   = 'none';
    document.getElementById('uploadPlaceholder').style.display  = 'block';
    document.getElementById('journalFormError').textContent     = '';
  }

  function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
    return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
  }

  // 드래그 앤 드롭
  function initDragDrop() {
    const area = document.getElementById('uploadArea');
    area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
    area.addEventListener('dragleave', ()  => area.classList.remove('drag-over'));
    area.addEventListener('drop', e => {
      e.preventDefault();
      area.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) processImageFile(file);
    });
  }

  // ── 업무일지 등록 ──
  async function submitJournal(e) {
    e.preventDefault();
    const errEl  = document.getElementById('journalFormError');
    const infoEl = document.getElementById('journalFormInfo');
    errEl.textContent  = '';
    infoEl.textContent = '';

    const btn = document.getElementById('journalSubmitBtn');
    btn.disabled = true;
    btn.textContent = '등록 중...';

    try {
      const date    = document.getElementById('journalDate').value;
      const title   = document.getElementById('journalTitle').value.trim();
      const content = document.getElementById('journalContent').value.trim();

      if (!date || !title || !content) {
        errEl.textContent = '날짜, 제목, 내용을 모두 입력하세요.';
        return;
      }

      const data = {
        employeeId:   currentUser.employeeId,
        employeeName: currentUser.name,
        date,
        title,
        content,
      };

      await addWorkJournal(data, selectedImageBase64, selectedImageType);

      showToast('업무일지가 등록되었습니다!');
      if (selectedImageBase64) {
        infoEl.textContent = '📷 사진이 포함된 일지는 저장 후 잠시 뒤 목록에서 확인할 수 있습니다.';
      }
      resetJournalForm();
    } catch (err) {
      errEl.textContent = err.message || '등록에 실패했습니다.';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v14a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg> 등록하기';
    }
  }

  function resetJournalForm() {
    document.getElementById('journalForm').reset();
    document.getElementById('journalDate').value = getTodayStr();
    document.getElementById('journalFormError').textContent = '';
    removeImage();
  }

  // ── 업무일지 조회 ──
  async function loadAllJournals() {
    setLoading(true);
    try {
      const journals = await fetchWorkJournalsByEmployee(currentUser.employeeId);
      renderJournalList(journals);
    } catch (err) {
      showApiError(err.message);
    } finally {
      setLoading(false);
    }
  }

  async function loadJournalsByDate() {
    const date = document.getElementById('filterDate').value;
    if (!date) { loadAllJournals(); return; }
    setLoading(true);
    try {
      const all = await fetchWorkJournalsByEmployee(currentUser.employeeId);
      renderJournalList(all.filter(j => j['날짜'] === date));
    } catch (err) {
      showApiError(err.message);
    } finally {
      setLoading(false);
    }
  }

  function clearDateFilter() {
    document.getElementById('filterDate').value = '';
    loadAllJournals();
  }

  function goToToday() {
    document.getElementById('filterDate').value = getTodayStr();
    loadJournalsByDate();
  }

  function renderJournalList(journals) {
    const el = document.getElementById('journalList');
    if (!journals || journals.length === 0) {
      el.innerHTML = '<div style="padding:40px; text-align:center; color:var(--gray-400);">등록된 업무일지가 없습니다.</div>';
      return;
    }
    el.innerHTML = journals.map(j => {
      const imgHtml = j['이미지URL']
        ? `<img class="journal-list-image" src="${escapeHtml(j['이미지URL'])}" alt="업무 사진"
              onclick="openLightbox('${escapeHtml(j['이미지URL'])}')"
              onerror="this.style.display='none'" />`
        : '';
      return `
        <div class="journal-list-item">
          <div class="journal-list-header">
            <div class="journal-list-date">📅 ${j['날짜'] || '-'}</div>
            <div style="font-size:12px; color:var(--gray-400);">${formatDateTime(j['작성일시'])}</div>
          </div>
          <div class="journal-list-title">${escapeHtml(j['제목'] || '')}</div>
          <div class="journal-list-content">${escapeHtml(j['내용'] || '')}</div>
          ${imgHtml}
        </div>
      `;
    }).join('');
  }

  // ── 이미지 라이트박스 ──
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  // ── 유틸 ──
  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatDateTime(dt) {
    if (!dt) return '-';
    const parts = dt.split(' ');
    const datePart = parts[0] || '';
    const timePart = parts[1] ? parts[1].substring(0, 5) : '';
    const [, m, d] = datePart.split('-');
    return `${Number(m)}월 ${Number(d)}일 ${timePart}`;
  }

  document.addEventListener('DOMContentLoaded', () => {
    const user = requireAuth();
    if (!user) return;
    currentUser = user;

    renderSidebar(user);
    initNoticeBanner();
    initDragDrop();

    // 날짜 기본값: 오늘
    document.getElementById('journalDate').value = getTodayStr();
  });
</script>
</body>
</html>
