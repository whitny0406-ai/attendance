<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>직원 관리 — 출퇴근 관리</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header" id="siteHeader"></header>

<div id="globalLoader" role="status" aria-label="로딩 중">
  <div class="spinner"></div>
</div>

<main class="main">
  <div class="page-title">직원 관리</div>
  <div class="page-subtitle">직원 등록·수정·퇴직 처리</div>

  <div class="card section">
    <div class="section-header">
      <div class="flex gap-12 flex" style="align-items:center; flex-wrap:wrap; gap:12px;">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input class="form-control" id="searchInput" type="text" placeholder="이름 또는 소속 검색" oninput="filterTable()" />
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--neutral-600);">
          <input type="checkbox" id="showRetired" onchange="filterTable()" />
          퇴직자 포함
        </label>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openEmployeeModal()">+ 직원 등록</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>직원ID</th>
            <th>이름</th>
            <th>소속</th>
            <th>직종</th>
            <th>연락처</th>
            <th>예정 근무</th>
            <th>권한</th>
            <th>상태</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="employeeTableBody">
          <tr><td colspan="9" class="empty-row">데이터를 불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- 직원 등록/수정 모달 -->
<div class="modal-overlay" id="employeeModal" role="dialog" aria-modal="true" aria-labelledby="employeeModalTitle">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="employeeModalTitle">직원 등록</div>
      <button class="modal-close" onclick="closeEmployeeModal()" aria-label="닫기">✕</button>
    </div>
    <form id="employeeForm" onsubmit="submitEmployee(event)">
      <input type="hidden" id="editEmpId" />
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="empName">이름 <span style="color:var(--danger)">*</span></label>
          <input class="form-control" id="empName" type="text" placeholder="홍길동" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="empPhone">연락처</label>
          <input class="form-control" id="empPhone" type="tel" placeholder="010-0000-0000" />
        </div>
        <div class="form-group">
          <label class="form-label" for="empDept">소속</label>
          <input class="form-control" id="empDept" type="text" placeholder="소속 부서/단체" />
        </div>
        <div class="form-group">
          <label class="form-label" for="empJob">직종</label>
          <input class="form-control" id="empJob" type="text" placeholder="예: 무용수, 연주자" />
        </div>
        <div class="form-group">
          <label class="form-label" for="empRole">권한</label>
          <select class="form-control" id="empRole">
            <option value="직원">직원</option>
            <option value="관리자">관리자</option>
          </select>
        </div>
        <div class="form-group" id="passwordGroup">
          <label class="form-label" for="empPassword">초기 비밀번호 <span style="color:var(--danger)">*</span></label>
          <input class="form-control" id="empPassword" type="password" placeholder="초기 비밀번호" />
        </div>
        <div class="form-group">
          <label class="form-label" for="empScheduleIn">예정 출근</label>
          <input class="form-control" id="empScheduleIn" type="time" />
        </div>
        <div class="form-group">
          <label class="form-label" for="empScheduleOut">예정 퇴근</label>
          <input class="form-control" id="empScheduleOut" type="time" />
        </div>
      </div>
      <div id="empFormError" class="form-error"></div>
      <div class="flex gap-12 mt-16">
        <button type="button" class="btn btn-outline w-full" onclick="closeEmployeeModal()">취소</button>
        <button type="submit" class="btn btn-primary w-full" id="empSubmitBtn">등록</button>
      </div>
    </form>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/gsheet-api.js"></script>
<script src="js/gsheet-write.js"></script>
<script>
  let allEmployees = [];

  async function loadEmployees() {
    setLoading(true);
    try {
      allEmployees = await fetchEmployees();
      filterTable();
    } catch (err) {
      showApiError(err.message);
    } finally {
      setLoading(false);
    }
  }

  function filterTable() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const showRetired = document.getElementById('showRetired').checked;

    const filtered = allEmployees.filter(e => {
      const matchStatus = showRetired || e['상태'] !== '퇴직';
      const matchQuery = !query ||
        e['이름']?.toLowerCase().includes(query) ||
        e['소속']?.toLowerCase().includes(query);
      return matchStatus && matchQuery;
    });

    renderEmployeeTable(filtered);
  }

  function renderEmployeeTable(employees) {
    const tbody = document.getElementById('employeeTableBody');
    if (employees.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty-row">직원이 없습니다.</td></tr>';
      return;
    }

    tbody.innerHTML = employees.map(e => {
      const isRetired = e['상태'] === '퇴직';
      const statusClass = isRetired ? 'status-absent' : 'status-done';
      return `<tr style="${isRetired ? 'opacity:0.6' : ''}">
        <td class="text-sm text-muted">${e['직원ID']}</td>
        <td class="font-bold">${e['이름']}</td>
        <td>${e['소속'] || '-'}</td>
        <td>${e['직종'] || '-'}</td>
        <td>${e['연락처'] || '-'}</td>
        <td>${e['예정출근시간'] || '-'} ${e['예정퇴근시간'] ? '~' + e['예정퇴근시간'] : ''}</td>
        <td><span class="tag tag-primary">${e['권한(관리자/직원)'] || '직원'}</span></td>
        <td><span class="status-badge ${statusClass} status-sm">${e['상태'] || '재직'}</span></td>
        <td>
          <div class="flex gap-8">
            <button class="btn btn-sm btn-outline" onclick='openEditModal(${JSON.stringify(e)})'>수정</button>
            ${!isRetired ? `<button class="btn btn-sm btn-danger" onclick="handleRetire('${e['직원ID']}', '${e['이름']}')">퇴직</button>` : ''}
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  let isEditMode = false;

  function openEmployeeModal() {
    isEditMode = false;
    document.getElementById('employeeModalTitle').textContent = '직원 등록';
    document.getElementById('empSubmitBtn').textContent = '등록';
    document.getElementById('employeeForm').reset();
    document.getElementById('editEmpId').value = '';
    document.getElementById('empFormError').textContent = '';
    document.getElementById('passwordGroup').style.display = 'block';
    document.getElementById('employeeModal').style.display = 'flex';
  }

  function openEditModal(emp) {
    isEditMode = true;
    document.getElementById('employeeModalTitle').textContent = '직원 수정';
    document.getElementById('empSubmitBtn').textContent = '저장';
    document.getElementById('editEmpId').value = emp['직원ID'];
    document.getElementById('empName').value = emp['이름'] || '';
    document.getElementById('empPhone').value = emp['연락처'] || '';
    document.getElementById('empDept').value = emp['소속'] || '';
    document.getElementById('empJob').value = emp['직종'] || '';
    document.getElementById('empRole').value = emp['권한(관리자/직원)'] || '직원';
    document.getElementById('empScheduleIn').value = emp['예정출근시간'] || '';
    document.getElementById('empScheduleOut').value = emp['예정퇴근시간'] || '';
    document.getElementById('empFormError').textContent = '';
    document.getElementById('passwordGroup').style.display = 'none'; // 수정 시 비밀번호 변경 불필요
    document.getElementById('employeeModal').style.display = 'flex';
  }

  function closeEmployeeModal() {
    document.getElementById('employeeModal').style.display = 'none';
  }

  async function submitEmployee(e) {
    e.preventDefault();
    const errorEl = document.getElementById('empFormError');
    errorEl.textContent = '';
    const submitBtn = document.getElementById('empSubmitBtn');
    submitBtn.disabled = true;

    const name = document.getElementById('empName').value.trim();
    const password = document.getElementById('empPassword').value;

    if (!name) { errorEl.textContent = '이름을 입력하세요.'; submitBtn.disabled = false; return; }
    if (!isEditMode && !password) { errorEl.textContent = '초기 비밀번호를 입력하세요.'; submitBtn.disabled = false; return; }

    try {
      const data = {
        name,
        phone: document.getElementById('empPhone').value.trim(),
        department: document.getElementById('empDept').value.trim(),
        jobTitle: document.getElementById('empJob').value.trim(),
        role: document.getElementById('empRole').value,
        scheduledIn: document.getElementById('empScheduleIn').value,
        scheduledOut: document.getElementById('empScheduleOut').value,
      };

      if (isEditMode) {
        const empId = document.getElementById('editEmpId').value;
        await updateEmployee(empId, data);
        showToast('직원 정보가 수정되었습니다.');
      } else {
        const hash = await sha256(password);
        await addEmployee({ ...data, passwordHash: hash });
        showToast('직원이 등록되었습니다.');
      }
      closeEmployeeModal();
      await loadEmployees();
    } catch (err) {
      errorEl.textContent = err.message;
    } finally {
      submitBtn.disabled = false;
    }
  }

  async function handleRetire(empId, name) {
    const confirmed = await confirmDialog(
      `${name} 직원을 퇴직 처리하시겠습니까?\n로그인이 차단되지만 이력은 유지됩니다.`,
      '퇴직 처리', '취소'
    );
    if (!confirmed) return;
    try {
      await retireEmployee(empId);
      showToast(`${name} 직원이 퇴직 처리되었습니다.`);
      await loadEmployees();
    } catch (err) {
      showApiError(err.message);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const user = requireAdmin();
    if (!user) return;
    renderHeader();
    renderUserInfo();
    renderNavLinks(user);
    loadEmployees();
  });
</script>
</body>
</html>
