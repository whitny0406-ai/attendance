<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드 — bkl HR</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="globalLoader" role="status" aria-label="로딩 중">
  <div class="spinner"></div>
</div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <h2>대시보드</h2>
      <p id="todayDateLabel"></p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        </div>
        <div class="stat-value" id="statTotal">-</div>
        <div class="stat-label">전체 재직자</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
        </div>
        <div class="stat-value" id="statPresent">-</div>
        <div class="stat-label">오늘 출근</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
        </div>
        <div class="stat-value" id="statAbsent">-</div>
        <div class="stat-label">미출근</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div class="stat-value" id="statNotOut">-</div>
        <div class="stat-label">미퇴근</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
        </div>
        <div class="stat-value" id="statPendingLeave">-</div>
        <div class="stat-label">대기 중 휴가</div>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <div class="card-title">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          오늘 출퇴근 현황
        </div>
        <button class="btn btn-outline btn-sm" onclick="loadDashboard()">새로고침</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>이름</th>
              <th>소속</th>
              <th>예정 근무</th>
              <th>출근</th>
              <th>퇴근</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody id="dashboardTableBody">
            <tr><td colspan="6" class="empty-row">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/gsheet-api.js"></script>
<script src="js/gsheet-write.js"></script>
<script src="js/leave.js"></script>
<script>
  async function loadDashboard() {
    const user = requireAdmin();
    if (!user) return;

    setLoading(true);
    try {
      const today = getTodayStr();
      const [employees, records, pending] = await Promise.all([
        fetchActiveEmployees(),
        fetchAttendanceByDate(today),
        fetchPendingLeaves(),
      ]);

      const recordMap = {};
      records.forEach(r => { recordMap[r['직원ID']] = r; });

      let present = 0, notOut = 0;

      const tbody = document.getElementById('dashboardTableBody');
      if (employees.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-row">재직 직원이 없습니다.</td></tr>';
      } else {
        tbody.innerHTML = employees.map(emp => {
          const rec = recordMap[emp['직원ID']];
          let statusText = '미출근', statusClass = 'badge-danger';

          if (rec) {
            if (rec['상태'] === '완료') {
              statusText = '퇴근완료'; statusClass = 'badge-success'; present++;
            } else {
              statusText = '미퇴근'; statusClass = 'badge-warning'; present++; notOut++;
            }
          }

          const lateTag = rec && emp['예정출근시간'] && isLater(rec['출근시간'], emp['예정출근시간'])
            ? '<span class="tag tag-warning">지각</span>' : '';

          return `<tr>
            <td class="font-bold">${emp['이름']}</td>
            <td>${emp['소속'] || '-'}</td>
            <td>${emp['예정출근시간'] || '-'}${emp['예정퇴근시간'] ? ' ~ ' + emp['예정퇴근시간'] : ''}</td>
            <td>${rec ? rec['출근시간'] : '-'} ${lateTag}</td>
            <td>${rec ? (rec['퇴근시간'] || '미기록') : '-'}</td>
            <td><span class="badge ${statusClass}">${statusText}</span></td>
          </tr>`;
        }).join('');
      }

      document.getElementById('statTotal').textContent = employees.length;
      document.getElementById('statPresent').textContent = present;
      document.getElementById('statAbsent').textContent = employees.length - present;
      document.getElementById('statNotOut').textContent = notOut;
      document.getElementById('statPendingLeave').textContent = pending.length;

      const badges = document.querySelectorAll('.pending-leave-badge');
      badges.forEach(b => { b.textContent = pending.length; b.style.display = pending.length > 0 ? 'inline-block' : 'none'; });

    } catch (err) {
      showApiError(err.message);
    } finally {
      setLoading(false);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const user = requireAdmin();
    if (!user) return;

    renderSidebar(user);

    const now = new Date();
    document.getElementById('todayDateLabel').textContent =
      `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${['일','월','화','수','목','금','토'][now.getDay()]}요일)`;

    loadDashboard();
  });
</script>
</body>
</html>
