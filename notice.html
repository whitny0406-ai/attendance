<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공지 관리 — bkl HR</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="globalLoader" role="status" aria-label="로딩 중">
  <div class="spinner"></div>
</div>

<!-- 이미지 라이트박스 -->
<div class="lightbox-overlay" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="이미지 확대" />
</div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>

  <main class="main-content">
    <div class="page-header">
      <h2>공지 관리</h2>
      <p>공지사항을 등록하고 관리합니다.</p>
    </div>

    <!-- 공지 등록 폼 -->
    <div class="card">
      <div class="card-title">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/>
        </svg>
        새 공지 등록
      </div>

      <form id="noticeForm" onsubmit="submitNotice(event)">
        <div class="form-group">
          <label class="form-label" for="noticeTitle">제목 <span style="color:var(--danger)">*</span></label>
          <input class="form-control" id="noticeTitle" type="text" placeholder="공지 제목을 입력하세요" required maxlength="100" />
        </div>

        <div class="form-group">
          <label class="form-label" for="noticeContent">내용 <span style="color:var(--danger)">*</span></label>
          <textarea class="form-control" id="noticeContent" placeholder="공지 내용을 입력하세요" required style="min-height:140px;" maxlength="2000"></textarea>
        </div>

        <!-- 이미지 첨부 (클릭/드래그/붙여넣기) -->
        <div class="form-group">
          <label class="form-label">
            이미지 첨부
            <span style="color:var(--gray-400); font-weight:400;">(선택 — 클릭, 드래그, 또는 Ctrl+V로 붙여넣기)</span>
          </label>
          <div class="image-upload-area" id="noticeUploadArea">
            <input type="file" id="noticeImageInput" accept="image/*" onchange="handleNoticeImageSelect(event)" />
            <div id="noticeUploadPlaceholder">
              <div class="image-upload-icon">
                <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                  <path d="M21 15l-5-5L5 21"/>
                </svg>
              </div>
              <div class="image-upload-text">클릭하거나 이미지를 드래그 또는 붙여넣기(Ctrl+V)</div>
              <div class="image-upload-hint">JPG, PNG, GIF 지원 (최대 5MB)</div>
            </div>
          </div>
          <div id="noticeImagePreviewArea" style="margin-top:10px; display:none;">
            <div class="image-preview-wrap">
              <img id="noticeImagePreview" src="" alt="미리보기" style="max-width:100%; max-height:200px; border-radius:var(--radius-md); object-fit:contain; display:block;" />
              <button type="button" class="image-preview-remove" onclick="removeNoticeImage()">✕</button>
            </div>
            <div id="noticeImageFileName" style="margin-top:4px; font-size:12px; color:var(--gray-400);"></div>
          </div>
        </div>

        <!-- 파일 첨부 -->
        <div class="form-group">
          <label class="form-label">
            파일 첨부
            <span style="color:var(--gray-400); font-weight:400;">(선택 — PDF, 문서, 엑셀 등 최대 10MB)</span>
          </label>
          <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
            <label class="btn btn-outline btn-sm" style="cursor:pointer; margin:0;">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              파일 선택
              <input type="file" id="noticeFileInput" style="display:none;"
                accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.hwp,.zip"
                onchange="handleNoticeFileSelect(event)" />
            </label>
            <span id="noticeFileLabel" style="font-size:13px; color:var(--gray-500);">선택된 파일 없음</span>
            <button type="button" id="noticeFileRemoveBtn" class="btn btn-sm" style="display:none; background:var(--gray-100); color:var(--danger); border:none;" onclick="removeNoticeFile()">✕ 제거</button>
          </div>
        </div>

        <div id="noticeFormError" class="form-error"></div>
        <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:4px;">
          <button type="button" class="btn btn-outline" onclick="resetNoticeForm()">초기화</button>
          <button type="submit" class="btn btn-primary" id="noticeSubmitBtn">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
            공지 등록
          </button>
        </div>
      </form>
    </div>

    <!-- 공지 목록 -->
    <div class="card">
      <div class="section-header">
        <div class="card-title">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
          </svg>
          공지 목록
        </div>
        <button class="btn btn-outline btn-sm" onclick="loadNotices()">새로고침</button>
      </div>

      <div class="tabs" style="margin-bottom:16px;">
        <button class="tab-btn active" onclick="switchTab('tabActive', this)">활성 공지</button>
        <button class="tab-btn"        onclick="switchTab('tabAll',    this)">전체 공지</button>
      </div>

      <div id="tabActive"><div id="activeNoticeList"><div class="empty-row">불러오는 중...</div></div></div>
      <div id="tabAll" style="display:none;"><div id="allNoticeList"><div class="empty-row">불러오는 중...</div></div></div>
    </div>
  </main>
</div>

<!-- 공지 수정 모달 -->
<div class="modal-overlay" id="editNoticeModal" role="dialog" aria-modal="true">
  <div class="modal-box" style="max-width:540px">
    <div class="modal-header">
      <div class="modal-title">공지 수정</div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <form id="editNoticeForm" onsubmit="submitEditNotice(event)">
      <input type="hidden" id="editNoticeId" />
      <div class="form-group">
        <label class="form-label">제목</label>
        <input class="form-control" id="editNoticeTitle" required maxlength="100" />
      </div>
      <div class="form-group">
        <label class="form-label">내용</label>
        <textarea class="form-control" id="editNoticeContent" required style="min-height:140px;" maxlength="2000"></textarea>
      </div>
      <div id="editNoticeError" class="form-error"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" onclick="closeEditModal()">취소</button>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/gsheet-api.js"></script>
<script src="js/gsheet-write.js"></script>
<script>
  // ── 첨부 상태 ──
  let noticeImageBase64 = null;
  let noticeImageType   = 'image/jpeg';
  let noticeFileBase64  = null;
  let noticeFileType    = '';
  let noticeFileName    = '';

  // ── 탭 전환 ──
  function switchTab(tabId, btn) {
    document.getElementById('tabActive').style.display = tabId === 'tabActive' ? 'block' : 'none';
    document.getElementById('tabAll').style.display    = tabId === 'tabAll'    ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // ── 이미지 처리 ──
  function handleNoticeImageSelect(e) {
    const file = e.target.files[0];
    if (file) processNoticeImage(file);
  }

  function processNoticeImage(file) {
    if (file.size > 5 * 1024 * 1024) {
      document.getElementById('noticeFormError').textContent = '이미지는 5MB 이하만 가능합니다.';
      return;
    }
    compressImage(file, 1200, 0.75).then(base64 => {
      noticeImageBase64 = base64;
      noticeImageType   = file.type || 'image/jpeg';
      document.getElementById('noticeImagePreview').src = base64;
      document.getElementById('noticeImageFileName').textContent = file.name;
      document.getElementById('noticeUploadPlaceholder').style.display = 'none';
      document.getElementById('noticeImagePreviewArea').style.display  = 'block';
      document.getElementById('noticeFormError').textContent = '';
    });
  }

  function removeNoticeImage() {
    noticeImageBase64 = null;
    document.getElementById('noticeImageInput').value = '';
    document.getElementById('noticeImagePreviewArea').style.display  = 'none';
    document.getElementById('noticeUploadPlaceholder').style.display = 'block';
  }

  // ── 파일 처리 ──
  function handleNoticeFileSelect(e) {
    const file = e.target.files[0];
    if (file) processNoticeFile(file);
  }

  function processNoticeFile(file) {
    const maxSize = 10 * 1024 * 1024;
    if (file.size > maxSize) {
      document.getElementById('noticeFormError').textContent = '파일은 10MB 이하만 가능합니다.';
      return;
    }
    document.getElementById('noticeFormError').textContent = '';
    const reader = new FileReader();
    reader.onload = (ev) => {
      noticeFileBase64 = ev.target.result; // data:...;base64,...
      noticeFileType   = file.type;
      noticeFileName   = file.name;
      document.getElementById('noticeFileLabel').textContent = `📎 ${file.name} (${formatFileSize(file.size)})`;
      document.getElementById('noticeFileRemoveBtn').style.display = 'inline-flex';
    };
    reader.readAsDataURL(file);
  }

  function removeNoticeFile() {
    noticeFileBase64 = null; noticeFileType = ''; noticeFileName = '';
    document.getElementById('noticeFileInput').value = '';
    document.getElementById('noticeFileLabel').textContent = '선택된 파일 없음';
    document.getElementById('noticeFileRemoveBtn').style.display = 'none';
  }

  // ── 이미지 압축 ──
  function compressImage(file, maxWidth, quality) {
    return new Promise(resolve => {
      const canvas = document.createElement('canvas');
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(maxWidth / img.width, 1);
        canvas.width  = Math.round(img.width  * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = URL.createObjectURL(file);
    });
  }

  // ── 드래그 앤 드롭 + 클립보드 붙여넣기 ──
  function initUploadEvents() {
    const area = document.getElementById('noticeUploadArea');

    // 드래그 앤 드롭
    area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
    area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
    area.addEventListener('drop', e => {
      e.preventDefault(); area.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) processNoticeImage(file);
    });

    // 페이지 전체에서 Ctrl+V 붙여넣기 감지
    document.addEventListener('paste', e => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) { processNoticeImage(file); break; }
        }
      }
    });
  }

  // ── 공지 등록 ──
  async function submitNotice(e) {
    e.preventDefault();
    const errEl = document.getElementById('noticeFormError');
    errEl.textContent = '';
    const btn = document.getElementById('noticeSubmitBtn');
    btn.disabled = true; btn.textContent = '등록 중...';

    try {
      const user    = getUser();
      const title   = document.getElementById('noticeTitle').value.trim();
      const content = document.getElementById('noticeContent').value.trim();
      if (!title || !content) { errEl.textContent = '제목과 내용을 모두 입력하세요.'; return; }

      await addNoticeWithMedia({
        title, content, author: user.name,
      }, noticeImageBase64, noticeImageType, noticeFileBase64, noticeFileType, noticeFileName);

      showToast('공지가 등록되었습니다.');
      resetNoticeForm();
      setTimeout(loadNotices, 1500);
    } catch (err) {
      errEl.textContent = err.message || '등록 실패';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg> 공지 등록';
    }
  }

  function resetNoticeForm() {
    document.getElementById('noticeForm').reset();
    document.getElementById('noticeFormError').textContent = '';
    removeNoticeImage();
    removeNoticeFile();
  }

  // ── 공지 목록 ──
  async function loadNotices() {
    setLoading(true);
    try {
      const all = (await fetchNotices()).sort((a, b) => b['작성일시'] > a['작성일시'] ? 1 : -1);
      renderNoticeTable(all.filter(n => n['상태'] === '활성'), 'activeNoticeList');
      renderNoticeTable(all, 'allNoticeList');
    } catch (err) { showApiError(err.message); }
    finally { setLoading(false); }
  }

  function renderNoticeTable(list, containerId) {
    const el = document.getElementById(containerId);
    if (!list || list.length === 0) {
      el.innerHTML = '<div style="padding:32px;text-align:center;color:var(--gray-400);">공지사항이 없습니다.</div>';
      return;
    }
    el.innerHTML = list.map(n => `
      <div class="notice-item" style="cursor:default;">
        <div class="notice-item-header">
          <div class="notice-item-title">${escapeHtml(n['제목'] || '')}</div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="badge ${n['상태']==='활성'?'badge-success':'badge-gray'}">${n['상태']||'-'}</span>
            <span class="notice-item-meta">${formatDateTime(n['작성일시'])}</span>
          </div>
        </div>
        <div class="notice-item-content">${escapeHtml(n['내용']||'')}</div>
        ${n['이미지URL'] ? `<img src="${escapeHtml(n['이미지URL'])}" style="margin-top:10px;max-height:160px;border-radius:var(--radius-md);cursor:pointer;" onclick="openLightbox('${escapeHtml(n['이미지URL'])}')" onerror="this.style.display='none'" />` : ''}
        ${n['첨부파일URL'] ? `<div style="margin-top:8px;"><a href="${escapeHtml(n['첨부파일URL'])}" target="_blank" class="btn btn-outline btn-sm">📎 ${escapeHtml(n['첨부파일명']||'첨부파일')} 다운로드</a></div>` : ''}
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-outline btn-sm" onclick="openEditModal(${JSON.stringify(n).replace(/"/g,'&quot;')})">수정</button>
          ${n['상태']==='활성'
            ? `<button class="btn btn-sm" style="background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;" onclick="toggleStatus('${n['공지ID']}','비활성')">비활성화</button>`
            : `<button class="btn btn-sm btn-success" onclick="toggleStatus('${n['공지ID']}','활성')">활성화</button>`}
          <button class="btn btn-danger btn-sm" onclick="deleteNoticeConfirm('${n['공지ID']}')">삭제</button>
        </div>
      </div>`).join('');
  }

  // ── 수정 모달 ──
  function openEditModal(notice) {
    document.getElementById('editNoticeId').value      = notice['공지ID'];
    document.getElementById('editNoticeTitle').value   = notice['제목'];
    document.getElementById('editNoticeContent').value = notice['내용'];
    document.getElementById('editNoticeError').textContent = '';
    document.getElementById('editNoticeModal').style.display = 'flex';
  }
  function closeEditModal() { document.getElementById('editNoticeModal').style.display = 'none'; }

  async function submitEditNotice(e) {
    e.preventDefault();
    const errEl = document.getElementById('editNoticeError');
    const btn   = e.target.querySelector('[type="submit"]');
    btn.disabled = true; errEl.textContent = '';
    try {
      const noticeId = document.getElementById('editNoticeId').value;
      const title    = document.getElementById('editNoticeTitle').value.trim();
      const content  = document.getElementById('editNoticeContent').value.trim();
      if (!title || !content) { errEl.textContent = '제목과 내용을 입력하세요.'; return; }
      await updateNotice(noticeId, { title, content });
      showToast('공지가 수정되었습니다.');
      closeEditModal(); setTimeout(loadNotices, 1500);
    } catch (err) { errEl.textContent = err.message; }
    finally { btn.disabled = false; }
  }

  async function toggleStatus(noticeId, newStatus) {
    const ok = await confirmDialog(`이 공지를 ${newStatus === '활성' ? '활성화' : '비활성화'}하시겠습니까?`);
    if (!ok) return;
    try { await updateNotice(noticeId, { status: newStatus }); showToast('처리 완료'); setTimeout(loadNotices, 1500); }
    catch (err) { showToast(err.message, 'error'); }
  }

  async function deleteNoticeConfirm(noticeId) {
    const ok = await confirmDialog('이 공지를 삭제하시겠습니까?', '삭제', '취소');
    if (!ok) return;
    try { await updateNotice(noticeId, { status: '삭제' }); showToast('삭제되었습니다.'); setTimeout(loadNotices, 1500); }
    catch (err) { showToast(err.message, 'error'); }
  }

  // ── 라이트박스 ──
  function openLightbox(src) { document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').classList.add('open'); }
  function closeLightbox()   { document.getElementById('lightbox').classList.remove('open'); }
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('lightbox').addEventListener('click', function(e){ if(e.target===this) closeLightbox(); });
  });

  // ── 유틸 ──
  function escapeHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatDateTime(dt) {
    if (!dt) return '-';
    const [date, time=''] = dt.split(' ');
    const [,m,d] = date.split('-');
    return `${Number(m)}월 ${Number(d)}일 ${time.substring(0,5)}`;
  }
  function formatFileSize(bytes) {
    if (bytes<1024) return bytes+'B';
    if (bytes<1024*1024) return (bytes/1024).toFixed(1)+'KB';
    return (bytes/(1024*1024)).toFixed(1)+'MB';
  }

  document.addEventListener('DOMContentLoaded', () => {
    const user = requireAdmin();
    if (!user) return;
    renderSidebar(user);
    initUploadEvents();
    loadNotices();
  });
</script>
</body>
</html>
